name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build editor
        run: pnpm editor:build

      # Smoke-test the CLIs against the Golden Goal Rush reference project.
      - name: Validate smoke (Golden Goal Rush)
        run: pnpm validate projects/golden-goal-rush.json

      - name: Export smoke (Golden Goal Rush)
        run: pnpm export projects/golden-goal-rush.json
